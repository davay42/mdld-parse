<!DOCTYPE html>
<html>

<head>
    <title>MD-LD Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="/demo/core.min.css" />

    <style>
        /* Light mode only */
        @media (prefers-color-scheme: light) {
            :root {
                --color-bg: #eee;
                --color-text: #444;
            }
        }

        /* Dark mode only */
        @media screen and (prefers-color-scheme: dark) {
            :root {
                --color-bg: #222;
                --color-text: #ddd;
            }
        }
    </style>

</head>

<body>
    <div id="app"></div>
    <script type="module">
        window.$docsify = {
            //...
            relativePath: true,
            themeColor: '#f97316',
            auto2top: true,
            name: "<b>MD-LD</b>",
            nameLink: "/docs.html",
            repo: "davay42/mdld-parse",
        };
    </script>
    <script type="module" src="/demo/docsify@5.0.0-rc.4.4.js"></script>
</body>

</html>
